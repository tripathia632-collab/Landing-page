<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Donate — Ma Sharanam Ashram</title>
  <meta name="description" content="Support Ma Sharanam Ashram — donate towards the Gurukul, Gaushala, organic farming, and daily spiritual programs.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="nav-root"></div>

<section class="page-hero">
  <div class="container">
    <span class="badge">Dana & Seva</span>
    <h1 id="don-heading"></h1>
    <p id="don-sub"></p>
  </div>
</section>

<!-- Donation Options -->
<section class="section">
  <div class="container">
    <div class="section-header text-center reveal">
      <span class="badge">How Your Donation Helps</span>
      <h2>Ways to Support</h2><div class="divider"></div>
    </div>
    <div class="grid-3" id="donate-ways"></div>
  </div>
</section>

<!-- Bank Details -->
<section class="section" style="background:var(--bg2);" id="bank">
  <div class="container">
    <div class="grid-2">
      <div class="bank-box reveal" id="indian-bank">
        <h3>🇮🇳 For Indian Donors</h3>
        <div id="indian-details"></div>
        <div style="margin-top:1.5rem;padding:1rem;background:rgba(201,168,76,.08);border-radius:var(--radius);font-size:.85rem;">
          <strong style="color:var(--gold);">Tax Benefit:</strong> <span id="tax-note"></span>
        </div>
      </div>
      <div class="bank-box reveal" id="foreign-bank">
        <h3>🌍 For Foreign Donors (FCRA)</h3>
        <div id="foreign-details"></div>
      </div>
    </div>
  </div>
</section>

<!-- Financial Reports -->
<section class="section" id="reports">
  <div class="container">
    <div class="section-header text-center reveal">
      <span class="badge">Transparency</span>
      <h2>Annual Financial Reports</h2>
      <div class="divider"></div>
      <p>We publish audited financial reports every year. Full transparency is our commitment to every donor.</p>
    </div>
    <div class="grid-3" id="reports-grid" style="gap:1rem;"></div>
  </div>
</section>

<div id="footer-root"></div>
<script src="data/content.js"></script><script src="js/main.js"></script>
<script>
(function(){
  const d = window.SITE.donate;
  document.getElementById('nav-root').innerHTML    = buildNav('donate.html');
  document.getElementById('footer-root').innerHTML = buildFooter();
  document.getElementById('don-heading').textContent = d.heroHeading;
  document.getElementById('don-sub').textContent     = d.heroSub;
  document.getElementById('tax-note').textContent    = d.taxNote;
  document.getElementById('donate-ways').innerHTML   = d.ways.map(w=>`
    <div class="donate-card reveal">
      <div class="donate-icon">${w.icon}</div>
      <div class="donate-title">${w.title}</div>
      <div class="donate-desc">${w.desc}</div>
    </div>`).join('');
  document.getElementById('indian-details').innerHTML = d.indianDetails.map(l=>{
    const [k,...v]=l.split(':'); return `<div class="bank-line"><strong>${k}:</strong><span>${v.join(':').trim()}</span></div>`;
  }).join('');
  document.getElementById('foreign-details').innerHTML = d.foreignDetails.map(l=>{
    const [k,...v]=l.split(':'); return `<div class="bank-line"><strong>${k}:</strong><span>${v.join(':').trim()}</span></div>`;
  }).join('');
  document.getElementById('reports-grid').innerHTML = d.financialReports.map(r=>`
    <a href="${r.link}" target="_blank" class="card reveal" style="text-align:center;text-decoration:none;">
      <div style="font-size:1.8rem;">📄</div>
      <p style="color:var(--gold);font-size:.9rem;margin-top:.5rem;">${r.label}</p>
      <span style="font-size:.78rem;color:var(--muted);">Click to Download PDF</span>
    </a>`).join('');
  initScrollReveal();
})();
</script>
</body></html>
