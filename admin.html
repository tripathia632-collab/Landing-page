<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Admin Panel — Ma Sharanam Ashram</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .admin-tab-bar { display:flex; gap:.5rem; margin-bottom:2rem; border-bottom:1px solid var(--border); padding-bottom:1rem; }
    .admin-tab { padding:.5rem 1.25rem; border-radius:8px; cursor:pointer; font-size:.88rem; transition:var(--transition); border:1px solid transparent; }
    .admin-tab.active { background:var(--gold); color:#0a150c; font-weight:700; }
    .admin-tab:hover:not(.active) { border-color:var(--border); }
    .admin-panel { display:none; }
    .admin-panel.active { display:block; }
  </style>
</head>
<body>
<div id="nav-root"></div>

<section class="page-hero">
  <div class="container">
    <span class="badge">⚙️ Admin Only</span>
    <h1>Admin Panel</h1>
    <p>Add blog posts, upload gallery photos, and manage ashram content.</p>
    <div style="margin-top:1rem;display:flex;align-items:center;gap:1rem;justify-content:center;">
      <span style="font-size:.9rem;color:var(--muted);">Signed in as <strong id="member-name" style="color:var(--gold);"></strong></span>
      <button id="logout-btn" class="btn btn-outline" style="padding:.4rem 1rem;font-size:.82rem;">Sign Out</button>
    </div>
  </div>
</section>

<section class="section">
  <div class="container" style="max-width:900px;">
    <div class="admin-tab-bar">
      <div class="admin-tab active" onclick="switchTab('blog')">📝 Add Blog Post</div>
      <div class="admin-tab" onclick="switchTab('gallery')">🖼️ Add Photo</div>
    </div>

    <!-- BLOG TAB -->
    <div class="admin-panel active" id="tab-blog">
      <h2 style="margin-bottom:1.5rem;">Publish a New Blog Post</h2>
      <form id="add-post-form">
        <div class="form-group">
          <label>Post Title *</label>
          <input id="post-title" type="text" placeholder="e.g. Reflections on Navaratri 2024" required>
        </div>
        <div class="form-group">
          <label>Short Excerpt (shown on blog listing)</label>
          <input id="post-excerpt" type="text" placeholder="A brief summary of the post (1–2 sentences)">
        </div>
        <div class="form-group">
          <label>Category</label>
          <select id="post-category">
            <option>Matri Vani</option>
            <option>Ashram</option>
            <option>Teachings</option>
            <option>Events</option>
          </select>
        </div>
        <div class="form-group">
          <label>Author Name</label>
          <input id="post-author" type="text" placeholder="Swami Gurusharan (leave blank for 'Ashram Team')">
        </div>
        <div class="form-group">
          <label>Cover Image URL (paste a link to an image)</label>
          <input id="post-image" type="url" placeholder="https://images.unsplash.com/…">
        </div>
        <div class="form-group">
          <label>Post Content * (HTML allowed — use &lt;p&gt;, &lt;h2&gt;, &lt;blockquote&gt; tags)</label>
          <textarea id="post-content" style="min-height:300px;" placeholder="&lt;p&gt;Write your blog post here…&lt;/p&gt;&#10;&lt;p&gt;You can use multiple paragraphs.&lt;/p&gt;" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Publish Post →</button>
      </form>
    </div>

    <!-- GALLERY TAB -->
    <div class="admin-panel" id="tab-gallery">
      <h2 style="margin-bottom:1.5rem;">Add a Photo to Gallery</h2>
      <form id="add-photo-form" style="display:none;">
        <div class="form-group">
          <label>Image URL * (paste a link to the photo)</label>
          <input id="photo-url" type="url" placeholder="https://…" required>
          <small style="color:var(--muted);font-size:.78rem;margin-top:.35rem;display:block;">Tip: Upload your photo to Google Drive, make it public, and paste the direct image link here.</small>
        </div>
        <div class="form-group">
          <label>Caption (optional)</label>
          <input id="photo-caption" type="text" placeholder="e.g. Morning Pooja at Kali Temple — Navaratri 2024">
        </div>
        <div class="form-group">
          <label>Category</label>
          <select id="photo-category">
            <option>Satsang</option>
            <option>Gurukul</option>
            <option>Gaushala</option>
            <option>Farm</option>
            <option>Festivals</option>
            <option>General</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary">Add to Gallery →</button>
      </form>
    </div>
  </div>
</section>

<div id="footer-root"></div>
<script src="data/content.js"></script>
<script src="js/main.js"></script>
<script type="module" src="js/auth.js"></script>
<script type="module" src="js/blog.js"></script>
<script type="module" src="js/gallery.js"></script>
<script>
  document.getElementById('nav-root').innerHTML    = buildNav('');
  document.getElementById('footer-root').innerHTML = buildFooter();
  function switchTab(name) {
    document.querySelectorAll('.admin-tab, .admin-panel').forEach(el => el.classList.remove('active'));
    document.getElementById(`tab-${name}`).classList.add('active');
    event.target.classList.add('active');
  }
</script>
</body></html>
