<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Gallery — Ma Sharanam Ashram</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .filter-bar { display:flex; gap:.75rem; flex-wrap:wrap; justify-content:center; margin-bottom:2.5rem; }
    .filter-btn { padding:.45rem 1.25rem; border-radius:50px; border:1px solid var(--border); background:transparent; color:var(--cream); font-size:.85rem; cursor:pointer; transition:var(--transition); }
    .filter-btn:hover,.filter-btn.active { background:var(--gold); border-color:var(--gold); color:#0a150c; font-weight:600; }
  </style>
</head>
<body>
<div id="nav-root"></div>

<section class="page-hero">
  <div class="container">
    <span class="badge">Life at the Ashram</span>
    <h1>Gallery</h1>
    <p>A visual journey through daily life, programs, festivals, and nature at Ma Sharanam Ashram.</p>
  </div>
</section>

<section class="section">
  <div class="container">
    <div class="filter-bar">
      <button class="filter-btn active" data-gallery-cat="all">All</button>
      <button class="filter-btn" data-gallery-cat="Gurukul">Gurukul</button>
      <button class="filter-btn" data-gallery-cat="Gaushala">Gaushala</button>
      <button class="filter-btn" data-gallery-cat="Satsang">Satsang</button>
      <button class="filter-btn" data-gallery-cat="Farm">Farm</button>
      <button class="filter-btn" data-gallery-cat="Festivals">Festivals</button>
    </div>
    <div id="gallery-loading" style="text-align:center;color:var(--muted);padding:2rem;">Loading gallery…</div>
    <div class="gallery-grid" id="gallery-grid"></div>
  </div>
</section>

<div id="footer-root"></div>
<script src="data/content.js"></script>
<script src="js/main.js"></script>
<script type="module" src="js/gallery.js"></script>
<script>
  document.getElementById('nav-root').innerHTML    = buildNav('gallery.html');
  document.getElementById('footer-root').innerHTML = buildFooter();
</script>
</body></html>
