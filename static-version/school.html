<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>School — Ma Sharanam Ashram</title>
  <meta name="description" content="Ma Sharanam School — quality education with spiritual values for children of all backgrounds.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="nav-root"></div>
<section class="page-hero">
  <div class="container">
    <span class="badge">Formal Education</span>
    <h1 id="sc-heading"></h1>
    <p id="sc-sub"></p>
  </div>
</section>

<section class="section">
  <div class="container">
    <div class="img-text">
      <div class="img-wrap reveal"><img id="sc-img" src="" alt="School"></div>
      <div class="text-block reveal">
        <span class="badge">Our School</span>
        <h2>Education with a Spiritual Heart</h2>
        <div class="divider left"></div>
        <p id="sc-intro1"></p>
        <p id="sc-intro2" style="margin-top:.75rem;"></p>
      </div>
    </div>
  </div>
</section>

<section class="section" style="background:var(--bg2);">
  <div class="container">
    <div class="section-header text-center reveal">
      <span class="badge">What Makes Us Different</span>
      <h2>Key Features</h2><div class="divider"></div>
    </div>
    <div class="grid-3" id="sc-features"></div>
  </div>
</section>

<section class="section">
  <div class="container">
    <div class="section-header text-center reveal">
      <span class="badge">Classes Offered</span>
      <h2>Academic Structure</h2><div class="divider"></div>
    </div>
    <div style="overflow-x:auto;">
      <table class="styled-table">
        <thead><tr><th>Level</th><th>Grades</th><th>Age Group</th></tr></thead>
        <tbody id="sc-classes"></tbody>
      </table>
    </div>
    <div style="text-align:center;margin-top:2.5rem;">
      <a href="contact.html" class="btn btn-primary">Enquire About Admission</a>
    </div>
  </div>
</section>

<div id="footer-root"></div>
<script src="data/content.js"></script><script src="js/main.js"></script>
<script>
(function(){
  const s = window.SITE.school;
  document.getElementById('nav-root').innerHTML    = buildNav('school.html');
  document.getElementById('footer-root').innerHTML = buildFooter();
  document.getElementById('sc-heading').textContent = s.heroHeading;
  document.getElementById('sc-sub').textContent     = s.heroSub;
  document.getElementById('sc-img').src             = s.heroImage;
  document.getElementById('sc-intro1').textContent  = s.intro1;
  document.getElementById('sc-intro2').textContent  = s.intro2;
  document.getElementById('sc-features').innerHTML  = s.features.map(f=>`
    <div class="card reveal"><div class="card-icon">${f.icon}</div><h3>${f.title}</h3><p>${f.desc}</p></div>`).join('');
  document.getElementById('sc-classes').innerHTML   = s.classes.map(c=>`
    <tr><td>${c.level}</td><td>${c.grades}</td><td>${c.age}</td></tr>`).join('');
  initScrollReveal();
})();
</script>
</body></html>
